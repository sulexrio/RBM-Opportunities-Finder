<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opportunity Finder</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#0B1120" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
  <header>
    <h1>Opportunity Finder</h1>
    <p>Remote + visa-sponsorship roles across your priority countries — verified where possible.</p>
  </header>

  <div class="sticky-controls">
    <div class="controls">
      <input id="search" type="text" placeholder="Search title, employer, keyword…" />
      <select id="countryFilter"><option value="ALL">All countries</option></select>
    </div>

    <div class="controls" style="padding-top:0;">
      <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:#8A93A6;">
        <input type="checkbox" id="hideCitizensOnly" checked />
        Hide "citizens/right-to-work only" listings
      </label>
    </div>

    <div class="controls" style="padding-top:0;">
      <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:#8A93A6;">
        <input type="checkbox" id="recentOnly" />
        Only postings from the last 14 days (needs a posted date — Canada listings can't be checked this way)
      </label>
    </div>

    <div class="cv-section">
      <label class="cv-upload-label" for="cvFile">
        📄 Upload your CV (PDF, Word, or .txt) — parsed on your phone, never uploaded anywhere
      </label>
      <input type="file" id="cvFile" accept=".pdf,.docx,.txt" />
      <div id="cvStatus" class="cv-status"></div>
      <div id="cvActiveRow" style="display:none;">
        <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:#8A93A6;margin-top:8px;">
          <input type="checkbox" id="cvMatchToggle" checked />
          Sort postings by fit to my CV
        </label>
        <button id="clearCvBtn">Remove CV</button>
        <button id="copyCvMatchesBtn">Copy top matches for AI precision review</button>
      </div>
    </div>

    <div class="controls" style="padding-top:0;">
      <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:#8A93A6;">
        <input type="checkbox" id="myListOnly" />
        Show only my saved/applied jobs
      </label>
    </div>

    <div class="status-bar" id="status">Loading…</div>
  </div>

  <div id="jobs"></div>

  <div class="manual-sources">
    <h2>Startup jobs &amp; co-founder matching (no open API — check directly)</h2>
    <ul id="startupSourcesList"></ul>
  </div>

  <div class="manual-sources">
    <h2>Curated portals (no open API — check directly)</h2>
    <ul id="manualSourcesList"></ul>
  </div>

  <button id="backToTop" aria-label="Back to top">↑</button>

  <script src="app.js"></script>
</body>
</html>
