[build]
  publish = "public"
  # Skip a deploy entirely when the only changes are the bot's automated
  # data refreshes (data/, public/data/) - these don't need a redeploy since
  # the app fetches jobs.json fresh over the network anyway. This is what
  # was burning through free Netlify deploy credits every 3 hours.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!data' ':!public/data'"
