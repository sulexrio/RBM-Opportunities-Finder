name: Fetch and merge opportunities

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours - wider spacing is honored more reliably by GitHub's free scheduler
  workflow_dispatch: {}    # lets you trigger a manual run from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch EURES (all EU/EEA countries)
        run: node scripts/fetch-eures.js

      - name: Fetch UK sponsor register
        run: node scripts/fetch-uk-sponsors.js

      - name: Fetch Canada Job Bank (best-effort)
        run: node scripts/fetch-canada.js

      - name: Fetch global remote boards (Remotive, RemoteOK, Arbeitnow)
        run: node scripts/fetch-remote-global.js

      - name: Fetch aggregators (Jooble, Careerjet, Adzuna — local boards + recruiters worldwide)
        env:
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          CAREERJET_AFFID: ${{ secrets.CAREERJET_AFFID }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: node scripts/fetch-aggregators.js

      - name: Fetch company ATS boards (Greenhouse, Lever, Ashby)
        run: node scripts/fetch-company-boards.js

      - name: Merge, verify, classify sponsorship, flag scam risk
        run: node scripts/merge.js

      - name: Translate non-English postings
        run: node scripts/translate.js

      - name: Commit updated data
        run: |
          git config user.name "opportunity-finder-bot"
          git config user.email "actions@github.com"
          git add data/jobs.json public/data/jobs.json data/raw/*.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update job data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
